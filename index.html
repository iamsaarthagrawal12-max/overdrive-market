<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Overdrive Market</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="app">

    <div class="topbar">
      <h1>📈 Overdrive Market</h1>
      <div class="roomBox">
        <input id="roomCode" placeholder="ROOM CODE" />
        <button onclick="createRoom()">Create Room</button>
        <button onclick="joinRoom(document.getElementById('roomCode').value)">Join Room</button>
      </div>

      <div class="roomDisplay">
        Room: <span id="roomDisplay">NONE</span>
      </div>
    </div>

    <div class="grid">

      <!-- MARKET PANEL -->
      <div class="panel market">
        <h2>📊 Market</h2>

        <button onclick="buy('AAPL')">Buy AAPL</button>
        <button onclick="buy('TSLA')">Buy TSLA</button>
        <button onclick="buy('INFY')">Buy INFY</button>
        <button onclick="buy('BTC')">Buy BTC</button>

        <div class="hint">
          Prices update live every 2s
        </div>
      </div>

      <!-- DASHBOARD -->
      <div class="panel dashboard">
        <div id="debug">Loading...</div>
      </div>

    </div>

  </div>

  <script type="module" src="app.js"></script>

</body>
</html>
